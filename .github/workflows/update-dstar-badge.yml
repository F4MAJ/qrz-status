name: Update D-STAR badge

on:
  workflow_dispatch:

  schedule:
    # Toutes les 10 minutes environ
    # Horaires en UTC
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: write

concurrency:
  group: update-dstar-badge
  cancel-in-progress: false

jobs:
  update-dstar-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update D-STAR badge
        run: python scripts/update_dstar_badge.py

      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet docs/dstar-f4maj.svg; then
            echo "No D-STAR badge change."
          else
            git add docs/dstar-f4maj.svg
            git commit -m "Update D-STAR badge"
            git push
          fi

name: Update propagation badge

on:
  workflow_dispatch:

  schedule:
    # Mise à jour quotidienne vers 08h00 heure française d'été
    # GitHub Actions utilise l'heure UTC
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-propagation-badge
  cancel-in-progress: false

jobs:
  update-propagation-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update propagation badge
        run: python scripts/update_propagation_badge.py

      - name: Commit propagation badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/propagation-f4maj.svg

          if git diff --cached --quiet; then
            echo "No propagation badge change."
          else
            git commit -m "Update propagation badge"
            git push
          fi

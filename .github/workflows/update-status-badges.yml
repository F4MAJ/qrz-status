name: Update status badges

on:
  workflow_dispatch:

  schedule:
    # Workflow principal F4MAJ.
    # Met à jour tous les badges QRZ dans un seul passage.
    # Deux tentatives par heure : minute 07 et minute 37 UTC.
    # Objectif : éviter les ratés et les conflits entre workflows séparés.
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: update-status-badges
  cancel-in-progress: false

jobs:
  update-status-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update weather badge
        run: python scripts/update_weather_badge.py

      - name: Update propagation badge
        run: python scripts/update_propagation_badge.py

      - name: Update D-STAR XLX933 badge
        run: python scripts/update_dstar_badge.py

      - name: Update XLX208C badge
        run: python scripts/update_xlx208c_badge.py

      - name: Commit all badges if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/meteo-f4maj.svg
          git add docs/propagation-f4maj.svg
          git add docs/dstar-f4maj.svg
          git add docs/xlx208c-f4maj.svg

          if git diff --cached --quiet; then
            echo "No badge change."
          else
            git commit -m "Update all status badges"
            git push
          fi

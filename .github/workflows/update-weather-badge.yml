name: Update weather badge

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-weather-badge
  cancel-in-progress: true

jobs:
  update-weather-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update weather badge
        run: python scripts/update_weather_badge.py

      - name: Commit weather badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/meteo-f4maj.svg

          if git diff --staged --quiet; then
            echo "No weather badge change."
          else
            git commit -m "Update weather badge"
            git pull --rebase origin main
            git push
          fi

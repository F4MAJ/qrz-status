name: Update weather badge

on:
  workflow_dispatch:

  schedule:
    # Mise à jour météo plusieurs fois par jour, en UTC.
    # En heure française d'été : environ 06h17, 08h17, 10h17, 12h17, 14h17, 16h17, 18h17, 20h17, 22h17.
    # Le choix de :17 évite les minutes trop chargées du début d'heure.
    - cron: "17 4,6,8,10,12,14,16,18,20 * * *"

permissions:
  contents: write

concurrency:
  group: update-weather-badge
  cancel-in-progress: false

jobs:
  update-weather-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update weather badge
        run: python scripts/update_weather_badge.py

      - name: Commit weather badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/meteo-f4maj.svg

          if git diff --cached --quiet; then
            echo "No weather badge change."
          else
            git commit -m "Update weather badge"
            git push
          fi

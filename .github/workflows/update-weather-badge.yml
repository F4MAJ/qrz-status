name: Update weather badge

on:
  workflow_dispatch:

  schedule:
    # Mise à jour météo automatique toutes les heures, minute 17 UTC.
    # En France : environ xxh17, avec décalage selon heure été/hiver.
    # La minute 17 évite le début d'heure, souvent plus chargé côté GitHub Actions.
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: update-weather-badge
  cancel-in-progress: false

jobs:
  update-weather-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update weather badge
        run: python scripts/update_weather_badge.py

      - name: Commit weather badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/meteo-f4maj.svg

          if git diff --cached --quiet; then
            echo "No weather badge change."
          else
            git commit -m "Update weather badge"
            git push
          fi
